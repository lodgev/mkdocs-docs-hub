<header class="dh-topbar">
  <div class="dh-topbar-left">
    <div class="dh-topbar-context">Documentation</div>
  </div>

  <div class="dh-topbar-center">
    <form class="dh-search" id="dh-search-form" role="search" autocomplete="off">
      <input
        id="dh-search-input"
        type="search"
        placeholder="Search docs..."
        aria-label="Search docs"
      >
      <button type="submit" aria-label="Submit search">⌕</button>
    </form>

    <div class="dh-search-results" id="dh-search-results" hidden></div>
  </div>
</header>
