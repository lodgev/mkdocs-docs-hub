<!DOCTYPE html>
<html lang="{{ config.theme.locale|default('en') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="{{ config.site_description|default('') }}">
  <title>{% if page and page.title %}{{ page.title }} - {% endif %}{{ config.site_name }}</title>
  <link rel="icon" href="{{ 'assets/img/favicon.svg'|url }}">
  <link rel="stylesheet" href="{{ 'assets/css/theme.css'|url }}">
  {% block extrahead %}{% endblock %}
  {% for path in config.extra_css %}
  <link rel="stylesheet" href="{{ path|url }}">
  {% endfor %}
</head>
<body data-md-color-scheme="default">
  <div class="dh-app" data-sidebar-state="open">
    {% include 'partials/sidebar.html' %}

    <div class="dh-content-shell">
      {% include 'partials/topbar.html' %}

      <main class="dh-main">
        {% block content %}{% endblock %}
      </main>

      {% include 'partials/footer.html' %}
    </div>
  </div>


  
  <script>
  window.DOCS_HUB_SEARCH_INDEX_URL = "{{ 'search/search_index.json'|url }}";
</script>

  <script src="{{ 'assets/js/theme.js'|url }}"></script>
  {% for path in config.extra_javascript %}
  <script src="{{ path|url }}"></script>
  {% endfor %}
</body>
</html>
